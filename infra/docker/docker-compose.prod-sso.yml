# Production SSO stack — uitbreiding op docker-compose.prod.yml
#
# Start altijd samen met de base prod stack:
#   docker compose \
#     -f infra/docker/docker-compose.prod.yml \
#     -f infra/docker/docker-compose.prod-sso.yml \
#     --env-file infra/.env.prod \
#     up -d
#
# Keycloak draait in productie-modus (start, niet start-dev).
# Caddy (uit de base stack) handelt TLS af via Let's Encrypt.
# App: control.latero.nl | IDP: sso.latero.nl

services:
  # ── Postgres: extra env var voor Keycloak DB wachtwoord ─────────────────────
  # Het init-script infra/sql/init/999_keycloak_db.sh wordt automatisch
  # uitgevoerd via de bestaande volume mount in docker-compose.prod.yml.
  postgres:
    environment:
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}

  # ── Keycloak ─────────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: insights-keycloak
    command: start --import-realm
    restart: unless-stopped
    environment:
      # Database
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}

      # Hostname
      KC_HOSTNAME: sso.latero.nl
      KC_HOSTNAME_STRICT: "true"
      KC_HOSTNAME_STRICT_HTTPS: "true"

      # Proxy: Caddy handelt TLS af, Keycloak luistert op plain HTTP
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
      KC_HTTPS_ENABLED: "false"
      KC_HTTP_PORT: 8080

      # Admin credentials — zet in .env.prod
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}

      # Performance (single-node)
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "false"
      KC_CACHE: local
      JAVA_OPTS_APPEND: "-Xms256m -Xmx512m"
    ports:
      - "127.0.0.1:8080:8080"    # alleen intern; Caddy zit ervoor
    volumes:
      - ../keycloak/realm-latero-prod.rendered.json:/opt/keycloak/data/import/realm-latero-prod.json:ro
      - insights_keycloak_data:/opt/keycloak/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

  # ── App: extra env vars voor SSO ─────────────────────────────────────────────
  app:
    environment:
      OIDC_STATE_SECRET: ${OIDC_STATE_SECRET}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}

  # ── Caddy: gebruik de SSO-variant van de Caddyfile ───────────────────────────
  caddy:
    volumes:
      - ./Caddyfile.prod-sso:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
      - keycloak

volumes:
  insights_keycloak_data:
